# Hot-reload dev server (API base from host env at Vite startup)
services:
  admin-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${ADMIN_DEV_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://flowdesk-backend.luminoai.online/api}
    volumes:
      - .:/app
      - admin_node_modules:/app/node_modules

volumes:
  admin_node_modules:
